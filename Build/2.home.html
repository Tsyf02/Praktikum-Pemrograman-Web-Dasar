<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Talitha Syifa Al Fath_124250173">
    <meta name="description" content="Website Digital Library_Login Page">
    <title>Digital Library</title>
    <link rel="icon" href="Logo.png" type="image/x-icon"> 
    <link rel="stylesheet" href="Styling.css" type="text/css">
    
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0d0d0d; color: #f0ece4; overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 60px;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(10px);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #fff; text-decoration: none; font-weight: 700; }
    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
    .nav-links a { text-decoration: none; color: #ccc; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    /* HERO */
    .hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1600&q=80') center/cover no-repeat;
      animation: slowZoom 20s ease-in-out infinite alternate;
    }
    @keyframes slowZoom { to { transform: scale(1.08); } }
    .hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); }
    .hero-content {
      position: relative; z-index: 2; text-align: center; padding: 0 1.5rem;
      animation: fadeUp 0.9s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    .hero-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900; color: #fff; line-height: 1.15; margin-bottom: 1rem;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .hero-content p { font-size: 1rem; color: #ddd; max-width: 480px; margin: 0 auto 2rem; line-height: 1.6; }
    .btn-gold {
      display: inline-block; background: #c9a227; color: #fff;
      font-size: 0.9rem; font-weight: 600; padding: 12px 32px;
      border-radius: 40px; text-decoration: none;
      transition: background 0.25s, transform 0.2s;
    }
    .btn-gold:hover { background: #e0b835; transform: scale(1.04); }
  </style>
</head>
<body>
  <nav>
    <a href="2.home.html" class="logo">E-Library</a>
    <ul class="nav-links">
      <li><a href="2.home.html" class="active">Home</a></li>

      <li><a href="4.About.html">About</a></li>
      <li><a href="1.Login.html">Login</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Perpustakaan Digital Sistem Informasi</h1>
      <p>Ruang literasi tanpa batas. Jelajahi ribuan buku dari berbagai kategori.</p>
      <a href="3.Katalog.html" class="btn-gold">Lihat Katalog</a>
    </div>
  </section>
</body>
</html>
